# Don't auto-run `pnpm install` before every `pnpm run <script>`.
# (Deps are already installed; this check was failing because of the
#  ignored build scripts below, which blocked `pnpm dev`.)
verifyDepsBeforeRun: false

# sharp / unrs-resolver have native build scripts. We don't need them
# (no next/image usage), so leave them un-built. Listing them here marks
# the decision so pnpm stops warning / exiting non-zero.
ignoredBuiltDependencies:
  - sharp
  - unrs-resolver

allowBuilds:
  '@stellar/stellar-sdk': set this to true or false
  bigint-buffer: set this to true or false
  blake-hash: set this to true or false
  bufferutil: set this to true or false
  protobufjs: set this to true or false
  sharp: set this to true or false
  tiny-secp256k1: set this to true or false
  unrs-resolver: set this to true or false
  usb: set this to true or false
  utf-8-validate: set this to true or false
